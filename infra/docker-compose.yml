version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# Production Docker Compose
# Usage: docker compose -f infra/docker-compose.yml --env-file infra/.env up -d
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  # ── REST API ─────────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: src/Api/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      API_KEY: ${API_KEY}
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - backend
      - frontend

  # ── WebSocket Service ─────────────────────────────────────────────────────────
  websocket:
    build:
      context: ..
      dockerfile: src/WebSocketService/Dockerfile
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      WS_API_KEY: ${WS_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend
      - frontend

volumes:
  postgres_data:
    driver: local

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
